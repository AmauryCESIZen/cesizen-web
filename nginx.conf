server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Routing côté client (React Router) : toute route inconnue
    # renvoie index.html pour que React gère la navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les fichiers statiques (JS, CSS, images)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
