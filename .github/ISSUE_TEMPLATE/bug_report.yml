name: "🐛 Rapport de bug"
description: "Signaler un dysfonctionnement de l'application"
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de remplir ce formulaire pour signaler un incident.
        La sévérité sera confirmée par l'équipe lors de la prise en compte.

  - type: textarea
    id: description
    attributes:
      label: Description du problème
      description: Décrivez clairement le dysfonctionnement constaté.
      placeholder: "Lors de la connexion, un message d'erreur s'affiche..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Étapes pour reproduire
      description: Comment reproduire le bug, étape par étape ?
      placeholder: |
        1. Aller sur la page de connexion
        2. Saisir un email valide
        3. Cliquer sur "Se connecter"
        4. Observer l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Que devrait-il se passer normalement ?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Sévérité estimée
      description: |
        Bloquant = service inutilisable sans contournement.
        Majeur = service inopérant par intermittence ou contournement possible.
        Mineur = altération mineure, service opérationnel.
      options:
        - "Bloquant"
        - "Majeur"
        - "Mineur"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environnement concerné
      options:
        - "Production"
        - "Recette / test"
        - "Développement local"
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: Composant concerné
      placeholder: "API / Back-office web / Application mobile"
    validations:
      required: false
