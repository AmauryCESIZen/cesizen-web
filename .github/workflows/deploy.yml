name: Deploy Web

# Déclenchement : à la publication d'un tag de version (ex. v1.0.0)
on:
  push:
    tags:
      - "v*"

jobs:
  # ── 1. Lint (vérification du code) ───────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  # ── 2. Construction et publication de l'image (taguée) ───────
  build-and-push:
    name: Build et push de l'image Docker
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Connexion au registre GitHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Préparation des tags d'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/amaurycesizen/cesizen-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build et push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # L'API est sur le même domaine, accessible via /api (chemin relatif)
          build-args: |
            VITE_API_URL=/api

  # ── 3. Déploiement sur la VM via SSH ─────────────────────────
  deploy:
    name: Déploiement sur la VM (production)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configuration de la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Déploiement
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ~/cesizen
            docker compose -f compose.prod.yml pull web
            docker compose -f compose.prod.yml up -d
            docker image prune -f
          EOF
